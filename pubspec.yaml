name: recall
description: "Recall — spaced revision app. Forget forgetting."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  supabase_flutter: ^2.15.0
  google_fonts: ^6.3.2
  flutter_svg: ^2.2.3
  sentry_flutter: ^9.22.0
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  connectivity_plus: ^7.1.1
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.6
  file_picker: ^8.3.7
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  firebase_core: ^3.15.0
  firebase_messaging: ^15.2.0
  permission_handler: ^11.4.0
  flutter_markdown: ^0.7.7+1
  purchases_flutter: ^10.3.0
  package_info_plus: ^9.0.1
  http: ^1.4.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  drift_dev: ^2.31.0
  build_runner: ^2.15.0

# Launcher icon generation (dark ring variant). Run: fvm dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app-icon-1024.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#16161B"
  adaptive_icon_foreground: "assets/icon/app-icon-foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/illustrations/
    - assets/icons/
    - assets/icons/tabs/
    - assets/icon/

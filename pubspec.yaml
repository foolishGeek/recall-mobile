name: recall
description: "Recall — spaced revision app. Forget forgetting."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  supabase_flutter: ^2.15.0
  google_fonts: ^6.3.2
  flutter_svg: ^2.2.3
  sentry_flutter: ^9.22.0
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  drift_dev: ^2.31.0
  build_runner: ^2.15.0

# Launcher icon generation (dark ring variant). Run: fvm dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app-icon-1024.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#16161B"
  adaptive_icon_foreground: "assets/icon/app-icon-foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/illustrations/
    - assets/icons/tabs/
    - assets/icon/
